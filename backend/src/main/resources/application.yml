server:
  port: 8080

spring:
  application:
    name: envirowatch-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/envirowatch}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

openaq:
  base-url: ${OPENAQ_BASE_URL:https://api.openaq.org}
  api-key: ${OPENAQ_API_KEY:}
  sync-interval-ms: ${OPENAQ_SYNC_INTERVAL:3600000}

logging:
  level:
    com.envirowatch: INFO
    org.springframework.web: WARN
